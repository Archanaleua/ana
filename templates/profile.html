{% extends "base.html" %}
{% block title %}Profile — ANA{% endblock %}
{% block hide_footer %}{% endblock %}
{% block content %}
<div class="auth-page">
<div class="auth-card" style="max-width: 560px;">
    <div style="text-align:center; margin-bottom: 24px;">
    <div style="width:72px; height:72px; border-radius:50%; background:var(--grad); margin:0 auto 14px; display:flex; align-items:center; justify-content:center; font-size:2rem;">
        👤
    </div>
    <h1 style="font-size:1.6rem;">Your Profile</h1>
    <p class="muted">Manage your account information</p>
    </div>

    <div id="profile-info">
    <div style="display:flex; flex-direction:column; gap:16px;">
        <div class="profile-field">
        <label>Full Name</label>
        <div class="profile-value" id="display-name">Loading...</div>
        </div>
        <div class="profile-field">
        <label>Email</label>
        <div class="profile-value" id="display-email">Loading...</div>
        </div>
        <div class="profile-field">
        <label>Member Since</label>
        <div class="profile-value" id="display-joined">Loading...</div>
        </div>
    </div>

    <div style="margin-top:28px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn btn--primary" onclick="showEdit()">✏️ Edit Profile</button>
        <a href="/app" class="btn btn--ghost">← Back to Chat</a>
    </div>
    </div>

    <div id="profile-edit" style="display:none;">
    <div style="display:flex; flex-direction:column; gap:14px;">
        <div>
        <label style="font-size:0.85rem; color:var(--muted); margin-bottom:6px; display:block;">Full Name</label>
        <input id="edit-name" type="text" class="auth-form" style="width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:0.95rem;" placeholder="Your name" />
        </div>
        <div>
        <label style="font-size:0.85rem; color:var(--muted); margin-bottom:6px; display:block;">Email</label>
        <input id="edit-email" type="email" disabled style="width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-size:0.95rem;" />
        </div>
    </div>
    <div id="profile-msg" style="margin-top:12px; font-size:0.9rem;"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="btn btn--primary" onclick="saveProfile()">Save Changes</button>
        <button class="btn btn--ghost" onclick="showDisplay()">Cancel</button>
    </div>
    </div>
</div>
</div>

<style>
.profile-field { display:flex; flex-direction:column; gap:4px; padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; }
.profile-field label { font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); }
.profile-value { font-size:1rem; font-weight:500; }
</style>

<script>
let profileData = {};

async function loadProfile() {
const res = await fetch("/api/profile", { credentials: "same-origin" });
const data = await res.json();
profileData = data;
document.getElementById("display-name").textContent = data.full_name || "Not set";
document.getElementById("display-email").textContent = data.email || "";
document.getElementById("display-joined").textContent = data.created_at ? new Date(data.created_at).toLocaleDateString("en-IN", { year:"numeric", month:"long", day:"numeric" }) : "—";
document.getElementById("edit-name").value = data.full_name || "";
document.getElementById("edit-email").value = data.email || "";
}

function showEdit() {
document.getElementById("profile-info").style.display = "none";
document.getElementById("profile-edit").style.display = "block";
}

function showDisplay() {
document.getElementById("profile-edit").style.display = "none";
document.getElementById("profile-info").style.display = "block";
}

async function saveProfile() {
const name = document.getElementById("edit-name").value.trim();
const msg = document.getElementById("profile-msg");
const res = await fetch("/api/profile", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "same-origin",
    body: JSON.stringify({ full_name: name }),
});
const data = await res.json();
if (data.ok) {
    msg.style.color = "var(--accent)";
    msg.textContent = "✅ Profile updated!";
    document.getElementById("display-name").textContent = name;
    setTimeout(() => { showDisplay(); msg.textContent = ""; }, 1500);
} else {
    msg.style.color = "red";
    msg.textContent = "❌ " + (data.error || "Failed");
}
}

loadProfile();
</script>
{% endblock %}
